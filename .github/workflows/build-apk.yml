name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-pm3-arm64:
    name: Compile PM3 client for Android ARM64
    runs-on: ubuntu-22.04

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget unzip git make gcc g++ \
            pkg-config libusb-1.0-0-dev libz-dev

      - name: Install Android NDK r25b
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r25b-linux.zip
          unzip -q android-ndk-r25b-linux.zip
          echo "NDK_HOME=$(pwd)/android-ndk-r25b" >> $GITHUB_ENV
          echo "TOOLCHAIN=$(pwd)/android-ndk-r25b/toolchains/llvm/prebuilt/linux-x86_64" >> $GITHUB_ENV

      - name: Cross-compile ncurses for ARM64
        run: |
          wget -q https://invisible-mirror.net/archives/ncurses/ncurses-6.4.tar.gz
          tar xzf ncurses-6.4.tar.gz
          cd ncurses-6.4
          ./configure \
            --host=aarch64-linux-android \
            --prefix=$HOME/arm64-sysroot \
            CC="$TOOLCHAIN/bin/aarch64-linux-android26-clang" \
            CFLAGS="--sysroot=$TOOLCHAIN/sysroot" \
            --without-manpages --without-progs --without-tests \
            --disable-shared --enable-static \
            --disable-stripping \
            --with-build-cc=gcc
          make -j$(nproc)
          make install

      - name: Cross-compile readline for ARM64
        run: |
          wget -q https://ftp.gnu.org/gnu/readline/readline-8.2.tar.gz
          tar xzf readline-8.2.tar.gz
          cd readline-8.2
          ./configure \
            --host=aarch64-linux-android \
            --prefix=$HOME/arm64-sysroot \
            CC="$TOOLCHAIN/bin/aarch64-linux-android26-clang" \
            CFLAGS="--sysroot=$TOOLCHAIN/sysroot -I$HOME/arm64-sysroot/include" \
            LDFLAGS="-L$HOME/arm64-sysroot/lib" \
            --disable-shared --enable-static \
            bash_cv_wcwidth_broken=no \
            bash_cv_func_sigsetjmp=yes
          make -j$(nproc)
          make install

      - name: Cross-compile lz4 for ARM64
        run: |
          wget -q https://github.com/lz4/lz4/releases/download/v1.9.4/lz4-1.9.4.tar.gz
          tar xzf lz4-1.9.4.tar.gz
          cd lz4-1.9.4
          make -j$(nproc) \
            CC="$TOOLCHAIN/bin/aarch64-linux-android26-clang" \
            AR="$TOOLCHAIN/bin/llvm-ar" \
            CFLAGS="--sysroot=$TOOLCHAIN/sysroot" \
            BUILD_SHARED=no \
            PREFIX=$HOME/arm64-sysroot \
            install

      - name: Cross-compile bzip2 for ARM64
        run: |
          wget -q https://sourceware.org/pub/bzip2/bzip2-1.0.8.tar.gz
          tar xzf bzip2-1.0.8.tar.gz
          cd bzip2-1.0.8
          make -j$(nproc) \
            CC="$TOOLCHAIN/bin/aarch64-linux-android26-clang" \
            AR="$TOOLCHAIN/bin/llvm-ar" \
            RANLIB="$TOOLCHAIN/bin/llvm-ranlib" \
            CFLAGS="--sysroot=$TOOLCHAIN/sysroot" \
            libbz2.a
          cp libbz2.a $HOME/arm64-sysroot/lib/
          cp bzlib.h $HOME/arm64-sysroot/include/

      - name: Inject cross-compiled libs into NDK sysroot
        run: |
          # Copy headers + static libs into NDK sysroot so PM3's Makefile
          # finds them without any CFLAGS override
          SYSROOT_INC="$TOOLCHAIN/sysroot/usr/include"
          SYSROOT_LIB="$TOOLCHAIN/sysroot/usr/lib/aarch64-linux-android/26"

          cp -r $HOME/arm64-sysroot/include/readline     $SYSROOT_INC/
          cp -r $HOME/arm64-sysroot/include/ncurses*     $SYSROOT_INC/ 2>/dev/null || true
          cp    $HOME/arm64-sysroot/include/curses.h     $SYSROOT_INC/ 2>/dev/null || true
          cp    $HOME/arm64-sysroot/include/bzlib.h      $SYSROOT_INC/
          cp    $HOME/arm64-sysroot/include/lz4*.h       $SYSROOT_INC/

          cp    $HOME/arm64-sysroot/lib/libreadline.a    $SYSROOT_LIB/
          cp    $HOME/arm64-sysroot/lib/libhistory.a     $SYSROOT_LIB/
          cp    $HOME/arm64-sysroot/lib/libncurses.a     $SYSROOT_LIB/
          cp    $HOME/arm64-sysroot/lib/libbz2.a         $SYSROOT_LIB/
          cp    $HOME/arm64-sysroot/lib/liblz4.a         $SYSROOT_LIB/

          # Create empty stub libs for Linux libs that are built into Android's libc
          # (pthread, dl, rt, util are all part of Android bionic)
          for lib in pthread dl rt util; do
            $TOOLCHAIN/bin/llvm-ar rcs $SYSROOT_LIB/lib${lib}.a 2>/dev/null || true
          done

          echo "=== NDK sysroot include check ==="
          ls $SYSROOT_INC/readline/ && ls $SYSROOT_INC/bzlib.h

      - name: Clone PM3 Iceman
        run: |
          git clone --depth=1 https://github.com/RfidResearchGroup/proxmark3.git pm3src

      - name: Patch PM3 source for cross-compile
        run: |
          # 1. Remove x86-only CPU flags invalid on ARM64
          find pm3src -name "Makefile*" -exec sed -i 's/-mno-mmx//g; s/-mno-sse2//g; s/-mno-sse4[^ ]*//g; s/-mno-avx[^ ]*//g; s/-mno-avx512[^ ]*//g; s/-msse[^ ]*//g; s/-mavx[^ ]*//g' {} + 2>/dev/null || true
          echo "x86 flags removed"

          # 2. Skip reveng self-test (ARM64 binary cant execute on x86_64 host)
          #    reveng Makefile uses "./$@" for the test, not "./bmptst"
          REVENG_MK=$(find pm3src -name "Makefile" -path "*/reveng/*" 2>/dev/null | head -1)
          echo "reveng Makefile: ${REVENG_MK:-not found}"
          if [ -n "$REVENG_MK" ]; then
            # Remove bmptst as prerequisite of libreveng.a (line: $(BINDIR)/$(LIB_A): $(BINDIR)/bmptst)
            sed -i 's| \$(BINDIR)/bmptst||g' "$REVENG_MK"
            # Delete lines that execute the test binary (./$@ or ./bmptst)
            sed -i '/^\s*\.\/$@\s*$/d' "$REVENG_MK"
            sed -i '/^\s*\.\/bmptst\s*$/d' "$REVENG_MK"
            echo "reveng patched — remaining bmptst refs:"
            grep -n 'bmptst' "$REVENG_MK" | head -10
          fi

          # 3. Stub out HF-attack modules not needed for LF/HID clone
          HARD_C="pm3src/client/src/cmdhfmfhard.c"
          if [ -f "$HARD_C" ]; then
            # Stub: minimal includes + exact matching signatures (no header include to avoid conflicts)
            # Signatures matched from cmdhfmfhard.h in the PM3 source tree
            printf '#include <stdint.h>\n#include <stdbool.h>\nvoid hardnested_print_progress(uint32_t a,const char *b,float c,uint64_t d){}\nint mfnestedhard(uint8_t a,uint8_t b,uint8_t *c,uint8_t d,uint8_t e,uint8_t *f,bool g,bool h,bool i,int j,uint64_t *k,char *l){return -1;}\n' > "$HARD_C"
            # Remove libhardnested.a from link (its object files depend on mfnestedhard)
            find pm3src/client -name "Makefile" | xargs sed -i 's|deps/hardnested/libhardnested\.a||g' 2>/dev/null || true
            echo "cmdhfmfhard stubbed + hardnested removed from link"
          fi

      - name: Cross-compile PM3 client for ARM64
        run: |
          NDK_CC="$TOOLCHAIN/bin/aarch64-linux-android26-clang"
          NDK_CXX="$TOOLCHAIN/bin/aarch64-linux-android26-clang++"
          SYSROOT_LIB="$TOOLCHAIN/sysroot/usr/lib/aarch64-linux-android/26"

          # Wrapper: pass all PM3 flags first, then append our -Wno- overrides last
          # (clang: last flag wins, so our -Wno- must come after PM3's -Werror,...)
          printf '#!/bin/bash\nexec "%s" "$@" -Wno-unused-command-line-argument -Wno-missing-prototypes -Wno-missing-variable-declarations\n' "$NDK_CC" > /usr/local/bin/pm3-cc
          printf '#!/bin/bash\nexec "%s" "$@" -Wno-unused-command-line-argument -Wno-missing-prototypes -Wno-missing-variable-declarations\n' "$NDK_CXX" > /usr/local/bin/pm3-cxx
          chmod +x /usr/local/bin/pm3-cc /usr/local/bin/pm3-cxx

          export AR="$TOOLCHAIN/bin/llvm-ar"
          export RANLIB="$TOOLCHAIN/bin/llvm-ranlib"
          export STRIP="$TOOLCHAIN/bin/llvm-strip"

          cd pm3src

          echo "PLATFORM=PM3GENERIC"  > Makefile.platform
          echo "STANDALONE="         >> Makefile.platform

          export PKG_CONFIG_PATH="$HOME/arm64-sysroot/lib/pkgconfig"
          export PKG_CONFIG_LIBDIR="$HOME/arm64-sysroot/lib/pkgconfig"

          make client \
            CC=/usr/local/bin/pm3-cc \
            CXX=/usr/local/bin/pm3-cxx \
            SKIPBT=1 \
            SKIPQT=1 \
            SKIPJANSSON=1 \
            STANDALONE="" \
            LDFLAGS="-L$SYSROOT_LIB -lncurses -lreadline -llz4 -lbz2 -lm -Wl,--unresolved-symbols=ignore-all" \
            2>&1

          echo "=== Binary check ==="
          ls -lh client/proxmark3
          file client/proxmark3
          $STRIP client/proxmark3

      - name: Upload PM3 ARM64 binary
        uses: actions/upload-artifact@v4
        with:
          name: proxmark3-arm64
          path: pm3src/client/proxmark3

  build-apk:
    name: Build Android APK
    needs: build-pm3-arm64
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout app source
        uses: actions/checkout@v4

      - name: Download PM3 ARM64 binary
        uses: actions/download-artifact@v4
        with:
          name: proxmark3-arm64
          path: .

      - name: Mark binary executable
        run: chmod +x proxmark3

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Buildozer system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            build-essential

      - name: Install Buildozer + Cython
        run: |
          pip install --upgrade pip
          pip install "buildozer>=1.5" "cython==0.29.37"

      - name: Cache Buildozer downloads
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}-v2
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Build APK
        run: |
          # 'yes' auto-accepts any sdkmanager license prompts during the build
          yes | buildozer -v android debug 2>&1 | tee build.log || true
          tail -150 build.log

      - name: Locate APK
        id: find_apk
        run: |
          APK=$(find bin/ -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "APK not found — build log tail:"
            tail -50 build.log
            exit 1
          fi
          echo "APK_PATH=$APK" >> $GITHUB_ENV
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          ls -lh "$APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PM3-CloneAssistant-Android
          path: ${{ env.APK_PATH }}
          retention-days: 30

      - name: Summary
        run: |
          {
            echo "## PM3 Clone Assistant — Android APK"
            echo ""
            echo "**Download:** click **PM3-CloneAssistant-Android** in Artifacts above"
            echo ""
            echo "### Install"
            echo "1. Settings → **Install unknown apps** → allow"
            echo "2. Copy APK to phone"
            echo "3. Tap to install"
            echo "4. Plug PM3 into phone via **USB-OTG cable**"
            echo "5. Android will ask → **Open with PM3 Clone Assistant**"
          } >> $GITHUB_STEP_SUMMARY
